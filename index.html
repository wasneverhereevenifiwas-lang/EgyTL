            "Combat Cadet": "fa-user-graduate",
            "Combat Novice": "fa-user",
            "Rookie": "fa-seedling"
        };

        let players = [];

        async function fetchPlayers() {
            try {
                const resp = await fetch(API_URL);
                if (!resp.ok) throw new Error('Network response was not ok');
                const data = await resp.json();
                // Keep all players, even if they have no tiers
                players = data.filter(p => p.name);
                players.forEach(p => {
                    let total = 0;
                    GAME_MODES.forEach(m => {
                        const obj = p.tiers[m] || { tier: 'Unranked', retired: false, peak: 'Unranked' };
                        const pointsFrom = obj.retired ? obj.tier : (obj.peak || obj.tier);
                        total += TIER_POINTS[pointsFrom] || 0;
                    });
                    p.points = total;
                    if (total >= 400) p.rank = "Combat Grandmaster";
                    else if (total >= 250) p.rank = "Combat Master";
                    else if (total >= 100) p.rank = "Combat Ace";
                    else if (total >= 50) p.rank = "Combat Specialist";
                    else if (total >= 20) p.rank = "Combat Cadet";
                    else if (total >= 10) p.rank = "Combat Novice";
                    else if (total >= 1) p.rank = "Rookie";
                    else p.rank = "Unranked";
                });
                localStorage.setItem('egypt_players', JSON.stringify(players));
                renderOverall();
            } catch (e) {
                console.error('Failed to fetch players:', e);
                const stored = localStorage.getItem('egypt_players');
                if (stored) {
                    players = JSON.parse(stored);
                    renderOverall();
                } else {
                    document.getElementById('tableBody').innerHTML = '<tr><td colspan="4">Failed to load data. Please try again later.</td></tr>';
                }
            }
        }

        function getSkinUrl(u) { return `https://minotar.net/avatar/${encodeURIComponent(u)}/40`; }
        function get3dSkinUrl(u) { return `https://visage.surgeplay.com/full/150/${encodeURIComponent(u)}`; }

        // Show all players, not only those with a tier
        function isPlayerRanked(p) {
            return true; // show everyone
        }

        function computeRanks(arr) {
            arr.sort((a, b) => {
                if (a.points !== b.points) return b.points - a.points;
                return a.name.localeCompare(b.name);
            });
            arr.forEach((player, index) => {
                player.displayRank = index + 1;
            });
        }

        function renderOverall(filter = '') {
            const ranked = players.filter(isPlayerRanked);
            computeRanks(ranked);
            const filtered = ranked
                .filter(p => p.name.toLowerCase().includes(filter.toLowerCase()))
                .sort((a, b) => b.points - a.points || a.name.localeCompare(b.name));

            const tbody = document.getElementById('tableBody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">No players found.</td></tr>';
                return;
            }
            let html = '';
            filtered.forEach(p => {
                const t = p.tiers;
                const tierList = GAME_MODES.map(m => {
                    const obj = t[m] || { tier: 'Unranked', retired: false, peak: 'Unranked' };
                    const effectivePoints = (obj.retired ? TIER_POINTS[obj.tier] : TIER_POINTS[obj.peak]) || 0;
                    return { mode: m, tier: obj.tier, retired: obj.retired, peak: obj.peak, effectivePoints };
                }).sort((a, b) => {
                    if (a.retired !== b.retired) return a.retired ? 1 : -1;
                    return b.effectivePoints - a.effectivePoints;
                });
                const circles = tierList.map(item => {
                    const icon = modeIconMap[item.mode];
                    const display = item.tier === 'Unranked' ? '-' : item.tier;
                    const retiredClass = item.retired ? 'retired' : '';
                    let tooltip = '';
                    if (item.retired) tooltip = `Retired ${item.tier} - ${TIER_POINTS[item.tier]} pts`;
                    else if (item.tier !== item.peak && item.peak !== 'Unranked')
                        tooltip = `Peak: ${item.peak} (${TIER_POINTS[item.peak]} pts) - Current: ${item.tier}`;
                    else tooltip = `${item.tier} - ${TIER_POINTS[item.tier]} pts`;
                    return `<span class="tier-cell tier-${item.tier} ${retiredClass}" data-tooltip="${tooltip}"><img src="${icon}" alt="${item.mode}" onerror="this.style.display='none'"> ${display}</span>`;
                }).join('');
                const rankIcon = rankIconMap[p.rank] || '';
                let rankIconHtml = '';
                if (rankIcon) {
                    if (rankIcon.startsWith('fa-')) rankIconHtml = `<i class="fas ${rankIcon} rank-fa-icon"></i>`;
                    else rankIconHtml = `<img src="${rankIcon}" class="rank-icon" onerror="this.style.display='none'">`;
                }
                let rankClass = '';
                if (p.displayRank === 1) rankClass = 'rank-1';
                else if (p.displayRank === 2) rankClass = 'rank-2';
                else if (p.displayRank === 3) rankClass = 'rank-3';
                let medal = '';
                if (p.displayRank === 1) medal = '<i class="fas fa-crown"></i>';
                else if (p.displayRank === 2) medal = '<i class="fas fa-medal"></i>';
                else if (p.displayRank === 3) medal = '<i class="fas fa-medal"></i>';
                const rankTooltip = p.rank;
                html += `<tr>
                    <td><span class="rank-position ${rankClass}">${medal} #${p.displayRank}</span></td>
                    <td><div style="display:flex; flex-direction:column; gap:4px;"><div class="player-cell"><img class="skin-avatar" src="${getSkinUrl(p.name)}" alt="skin" onerror="this.onerror=null; this.src='https://minotar.net/avatar/Steve/40';"><span class="player-name" data-player="${p.name}">${p.name}</span></div><div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;"><span class="region-badge"><i class="fas fa-map-marker-alt"></i> ${p.region || 'EU'}</span><span class="rank-info" data-tooltip="${rankTooltip}">${rankIconHtml} ${p.rank} (${p.points} pts)</span></div></div></td>
                    <td><div class="tier-row">${circles}</div></td>
                    <td><span class="total-points">${p.points}</span></td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        function renderGamemode(mode) {
            const relevant = players.filter(p => (p.tiers[mode]?.tier || 'Unranked') !== 'Unranked')
                .map(p => {
                    const obj = p.tiers[mode] || { tier: 'Unranked', peak: 'Unranked', retired: false };
                    const pointsFrom = obj.retired ? obj.tier : (obj.peak || obj.tier);
                    const modePoints = TIER_POINTS[pointsFrom] || 0;
                    return { p, modePoints };
                })
                .sort((a, b) => b.modePoints - a.modePoints || a.p.name.localeCompare(b.p.name))
                .slice(0, 100)
                .map(x => x.p);
            const groups = { 1: { HT: [], LT: [] }, 2: { HT: [], LT: [] }, 3: { HT: [], LT: [] }, 4: { HT: [], LT: [] },
                5: { HT: [], LT: [] } };
            relevant.forEach(p => {
                const tierStr = p.tiers[mode].tier;
                const match = tierStr.match(/^(HT|LT)(\d)$/);
                if (!match) return;
                const type = match[1],
                    num = parseInt(match[2]);
                if (num >= 1 && num <= 5) groups[num][type].push(p);
            });
            const tierClasses = ['tier-1', 'tier-2', 'tier-3', 'tier-4', 'tier-5'];
            const tierNames = ['Tier 1', 'Tier 2', 'Tier 3', 'Tier 4', 'Tier 5'];
            const tierColumns = document.getElementById('tierColumns');
            let html = '';
            for (let i = 1; i <= 5; i++) {
                const ht = groups[i].HT,
                    lt = groups[i].LT;
                html += `<div class="tier-column ${tierClasses[i - 1]}"><div class="tier-header"><img src="${modeIconMap[mode]}" onerror="this.style.display='none'"> ${tierNames[i - 1]}</div><div class="player-list">`;
                const all = [...ht, ...lt];
                if (all.length === 0) html += `<div class="empty-message">-</div>`;
                else {
                    all.forEach(p => {
                        const type = p.tiers[mode].tier.startsWith('HT') ? 'ht' : 'lt';
                        const chev = type === 'ht' ?
                            '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-chevron-double-up" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M7.646 2.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1-.708.708L8 3.707 2.354 9.354a.5.5 0 1 1-.708-.708z"/><path fill-rule="evenodd" d="M7.646 6.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1-.708.708L8 7.707l-5.646 5.647a.5.5 0 0 1-.708-.708z"/></svg>' :
                            '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-chevron-up" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M7.646 4.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1-.708.708L8 5.707l-5.646 5.647a.5.5 0 0 1-.708-.708z"/></svg>';
                        html += `<div class="player-row ${type}" data-player="${p.name}"><div class="player-info"><img class="player-avatar-small" src="${getSkinUrl(p.name)}" alt="${p.name}" onerror="this.onerror=null; this.src='https://minotar.net/avatar/Steve/40';"><span class="player-name-small">${p.name}</span></div><span class="player-chevron">${chev}</span></div>`;
                    });
                }
                html += `</div></div>`;
            }
            tierColumns.innerHTML = html;
        }

        // Modal
        const modalOverlay = document.getElementById('playerModal');
        const modalClose = document.getElementById('modalClose');
        const modalSkin = document.getElementById('modalSkin');
        const modalName = document.getElementById('modalName');
        const modalRank = document.getElementById('modalRank');
        const modalRegion = document.getElementById('modalRegion');
        const modalNameMC = document.getElementById('modalNameMC');
        const modalPosition = document.getElementById('modalPosition');
        const modalPoints = document.getElementById('modalPoints');
        const modalTiers = document.getElementById('modalTiers');

        function openModal(playerName) {
            const player = players.find(p => p.name === playerName);
            if (!player) return;
            const ranked = players.filter(isPlayerRanked);
            computeRanks(ranked);
            modalSkin.innerHTML = `<img src="${get3dSkinUrl(player.name)}" alt="skin" onerror="this.onerror=null; this.src='https://visage.surgeplay.com/full/150/Steve';">`;
            modalName.textContent = player.name;
            const rankIcon = rankIconMap[player.rank] || '';
            let rankIconHtml = '';
            if (rankIcon) {
                if (rankIcon.startsWith('fa-')) rankIconHtml = `<i class="fas ${rankIcon} rank-fa-icon"></i>`;
                else rankIconHtml = `<img src="${rankIcon}" onerror="this.style.display='none'">`;
            }
            modalRank.innerHTML = rankIconHtml + ' ' + player.rank;
            modalRank.setAttribute('data-tooltip', player.rank);
            modalRegion.innerHTML = `<i class="fas fa-map-marker-alt"></i> ${player.region || 'EU'}`;
            modalNameMC.href = `https://namemc.com/profile/${encodeURIComponent(player.name)}`;
            modalPosition.textContent = `#${player.displayRank}`;
            modalPoints.textContent = `Overall (${player.points} points)`;
            const tierList = GAME_MODES.map(m => {
                const obj = player.tiers[m] || { tier: 'Unranked', retired: false, peak: 'Unranked' };
                const eff = (obj.retired ? TIER_POINTS[obj.tier] : TIER_POINTS[obj.peak]) || 0;
                return { mode: m, tier: obj.tier, retired: obj.retired, peak: obj.peak, eff };
            }).sort((a, b) => {
                if (a.retired !== b.retired) return a.retired ? 1 : -1;
                return b.eff - a.eff;
            });
            const tHtml = tierList.map(item => {
                const icon = modeIconMap[item.mode];
                const display = item.tier === 'Unranked' ? '-' : item.tier;
                const retiredClass = item.retired ? 'retired' : '';
                let tip = '';
                if (item.retired) tip = `Retired ${item.tier} - ${TIER_POINTS[item.tier]} pts`;
                else if (item.tier !== item.peak && item.peak !== 'Unranked')
                    tip = `Peak: ${item.peak} (${TIER_POINTS[item.peak]} pts) - Current: ${item.tier}`;
                else tip = `${item.tier} - ${TIER_POINTS[item.tier]} pts`;
                return `<span class="modal-tier-badge tier-${item.tier} ${retiredClass}" data-tooltip="${tip}"><img src="${icon}" alt="${item.mode}" onerror="this.style.display='none'"> ${display}</span>`;
            }).join('');
            modalTiers.innerHTML = tHtml;
            modalOverlay.classList.add('active');
        }

        function closeModal() { modalOverlay.classList.remove('active'); }
        document.addEventListener('click', (e) => {
            const row = e.target.closest('[data-player]');
            if (row) openModal(row.getAttribute('data-player'));
        });
        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

        // Search
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const overallView = document.getElementById('overallView');
        const gamemodeView = document.getElementById('gamemodeView');
        const tabs = document.querySelectorAll('.tab');

        function showNotification(msg, duration) {
            const notification = document.getElementById('notification');
            const notificationMessage = document.getElementById('notificationMessage');
            notificationMessage.textContent = msg;
            notification.classList.add('show');
            if (window.notificationTimeout) clearTimeout(window.notificationTimeout);
            window.notificationTimeout = setTimeout(() => notification.classList.remove('show'), duration);
        }

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim().toLowerCase();
                if (!query) return;
                const player = players.find(p => p.name.toLowerCase() === query);
                if (player) openModal(player.name);
                else showNotification('Player not found', 2000);
            }
        });
        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.trim().toLowerCase();
            if (!query) return;
            const player = players.find(p => p.name.toLowerCase() === query);
            if (player) openModal(player.name);
            else showNotification('Player not found', 2000);
        });

        tabs.forEach(tab => {
            tab.addEventListener('click', function () {
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const mode = this.dataset.mode;
                if (mode === 'overall') {
                    overallView.style.display = 'block';
                    gamemodeView.style.display = 'none';
                    renderOverall(searchInput.value);
                } else {
                    overallView.style.display = 'none';
                    gamemodeView.style.display = 'block';
                    renderGamemode(mode);
                }
            });
        });

        // Theme toggle
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            showNotification(document.body.classList.contains('light-theme') ? 'Light theme' : 'Dark theme', 2000);
        });

        // Initial load
        fetchPlayers();
        setInterval(fetchPlayers, 60000);
    })();
</script>
</body>
</html>
